<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumiskin -Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="js.js"></script>
</head>
<body>

     <header>
             <div class="container"> 
                <nav>
                   <ul class="navbuttons">
                   <li><a href="pr.html"><b>Home</b></a></li>
                   <li><a href="#"><b>Products</b></a></li>
                   <li><a href="#"><b>About</b></a></li>
                  </ul>
               </nav>
   <a href="#" class="logo"><div class="logotext"><i>Lumiskin</i></div></a>  

       <div class="nav-buttons">
          <a href="login.html" class="btn-secondary"><b>Account</b></a>
          <a href="cart.html" class="btn-primary"><b>Cart</b></a><br>    
       </div>  
     </div>
</header>
  
<div class="split-layout">

    <div class="panel-image">
        <img src="images/skin2.jpg" alt="Skincare">
        <p class="tagline">Time to invest in your <strong>SKIN</strong></p>
    </div>

    <div class="panel-form">
    <div class="login-box">
        <div><h2 class="login-title">Login</h2></div>

         <div class="login-body">
           <form class="login-form" onsubmit="return validateLogin()">
            <label for="Email">Email</label>
            <input type="email" name="Email" id="Login_Email" placeholder="Enter your email"><br>

        <label for="Password">Password</label>
        <input type="password" name="Password" id="Login_Password" placeholder="Enter your password">

        <button type="submit" class="btn-primary">Sign up</button>
        <div class="form-links">
            <a href="forgot-password.html">Forgot your password?</a>
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
           </form>
      </div>
     </div>
    </div>
</div>
</body>
</html>
