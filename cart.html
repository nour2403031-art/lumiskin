<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiSkin Cart</title>
    <link rel="stylesheet" href="style.css">
     <script src="js.js"></script>
</head>
<body>
    <div class="product">
        <h2>Product Name</h2>
        <p>Price: $20.00</p>
        <button onclick="addToCart('Product Name', 20)">Add to Cart</button>
    </div>

    <div class="cart">
        <h2>Shopping Cart</h2>
        <ul id="cartItems"></ul>
        <p>Total: $<span id="totalAmount">0.00</span></p>
    </div>

   
</body>
</html>
